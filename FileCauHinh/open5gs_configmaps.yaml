- apiVersion: v1
  data:
    exporter.py: "from prometheus_client import start_http_server, Gauge\nimport time\n\n#
      Tạo biến RSRP chuẩn cho Prometheus\nrsrp_metric = Gauge('ueransim_ue_rsrp',
      'RSRP of UE', ['pod_name'])\n\nif __name__ == '__main__':\n    start_http_server(8080)\n
      \   print(\"\U0001F680 Exporter bắt đầu giả lập kịch bản UE di chuyển...\")\n
      \   \n    # Bắt đầu ở gần trạm (Sóng khỏe: -70 dBm)\n    current_rsrp = -70.0
      \n    \n    while True:\n        # Giả lập UE đi xa dần (giảm 1 dBm mỗi 2 giây)\n
      \       current_rsrp -= 1.0\n        \n        # Cập nhật vào Prometheus\n        rsrp_metric.labels(pod_name=\"ue1\").set(current_rsrp)\n
      \       \n        # In ra log để bạn dễ theo dõi\n        print(f\"Exporter
      đẩy vào Prometheus: {current_rsrp} dBm\")\n        \n        # Nếu sóng quá
      yếu (dưới -105 dBm), giả lập UE đã được Handover và sóng khỏe lại\n        if
      current_rsrp < -105.0:\n            current_rsrp = -70.0\n            \n        time.sleep(2)\n"
  kind: ConfigMap
