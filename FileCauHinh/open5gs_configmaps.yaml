- apiVersion: v1
  data:
    amfcfg.yaml: |
      logger:
        file: /open5gs/install/var/log/open5gs/amf.log

      global:
        max:
          ue: 1024

      amf:
        sbi:
          server:
            - dev: eth0
              advertise: amf-namf
              port: 80
          client:
            scp:
              - uri: http://scp-nscp:80
        ngap:
          server:
            - address: 10.10.3.200
        metrics:
          server:
            - address: 0.0.0.0
              port: 9090
        guami:
          - plmn_id:
              mcc: 001
              mnc: 01
            amf_id:
              region: 2
              set: 1
        tai:
          - plmn_id:
              mcc: 001
              mnc: 01
            tac: 1
        plmn_support:
          - plmn_id:
              mcc: 001
              mnc: 01
            s_nssai:
              - sst: 1
                sd: 000001
              - sst: 2
                sd: 000002
        security:
            integrity_order : [ NIA2, NIA1, NIA0 ]
            ciphering_order : [ NEA0, NEA1, NEA2 ]
        network_name:
            full: Open5GS
        amf_name: open5gs-amf0

        time:
          t3512:
            value: 540
